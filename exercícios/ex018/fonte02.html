<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fontes Externash1</title>
    <link rel="shortcut icon" href="https://cdn-icons-png.flaticon.com/512/2779/2779772.png" type="image/x-icon">
    <style>
        @font-face {
            font-family: 'Love';
            src: url('fontes/love story ttf.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;

            /*
            Tipos de format()
            - opentype (otf)
            - truetype (ttf)
            - embedded-opentype
            - truetype-aat (Apple Advanced Typography)
            - svg 
            */
        }
        body {
            font-family: Arial, Helvetica, sans-serif;
        }
        h1 {
            font-family: 'Love', Times, serif;
            font-size: 3em;
            font-weight: normal;
        }
    </style>
</head>
<body>
    <h1>Olá! Mundo</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quis officia eum culpa aliquam, adipisci, ab iste expedita quod voluptatibus soluta provident, nulla ratione nostrum corrupti mollitia veniam. Voluptatum, quod enim.</p>
</body>
</html>
