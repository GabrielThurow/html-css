<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em css</title>
    <style>
        *{  /* configuração globais das css */
            height: 100%;
        }
        body {
            background-image: linear-gradient(to right, #880CDC , #E40073 , #F8BA0D );
            /* to right= ir para a direita */
            /* to left= ir para a esquerda */
            /* to top= ir para sima */
            /* to bottom= ir para baixo */
            /* background-image: radial-gradient(circle, #880CDC, #E40073, #F8BA0D); */
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
